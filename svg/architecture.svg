<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 980" width="760" height="980" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="760" height="980" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="380" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#212529">Hybrid Protein Crystallization Predictor</text>
  <text x="380" y="58" text-anchor="middle" font-size="12" fill="#6c757d">ESM-2 Transformer + XGBoost + LightGBM → Ridge Meta-Learner</text>

  <!-- ── INPUT ── -->
  <rect x="260" y="75" width="240" height="44" rx="8" fill="#dee2e6" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="380" y="93" text-anchor="middle" font-size="13" font-weight="bold" fill="#212529">Protein Sequence</text>
  <text x="380" y="110" text-anchor="middle" font-size="11" fill="#495057">ACDEFGHIKLMNPQRSTVWY  (30–1500 aa)</text>

  <!-- Arrow down -->
  <line x1="380" y1="119" x2="380" y2="143" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── ESM Tokenizer ── -->
  <rect x="285" y="143" width="190" height="36" rx="8" fill="#cfe2ff" stroke="#9ec5fe" stroke-width="1.5"/>
  <text x="380" y="166" text-anchor="middle" font-size="12" font-weight="bold" fill="#084298">ESM-2 Tokenizer</text>

  <line x1="380" y1="179" x2="380" y2="203" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── ESM Transformer ── -->
  <rect x="220" y="203" width="320" height="58" rx="8" fill="#cfe2ff" stroke="#6ea8fe" stroke-width="2"/>
  <text x="380" y="224" text-anchor="middle" font-size="12" font-weight="bold" fill="#084298">ESM-2 Transformer</text>
  <text x="380" y="240" text-anchor="middle" font-size="11" fill="#084298">facebook/esm2_t6_8M_UR50D  (8M params)</text>
  <text x="380" y="254" text-anchor="middle" font-size="10" fill="#0a58ca">Layers 0–4: FROZEN  |  Layer 5: fine-tuned</text>

  <line x1="380" y1="261" x2="380" y2="285" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Mean Pool ── -->
  <rect x="300" y="285" width="160" height="34" rx="8" fill="#d1ecf1" stroke="#0dcaf0" stroke-width="1.5"/>
  <text x="380" y="307" text-anchor="middle" font-size="12" font-weight="bold" fill="#055160">Mean Pool → 320-D</text>

  <!-- Fork: ESM left, Phys right -->
  <!-- left line -->
  <line x1="300" y1="302" x2="200" y2="340" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- right branch label -->
  <line x1="460" y1="302" x2="560" y2="340" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ESM embedding box -->
  <rect x="120" y="340" width="160" height="40" rx="8" fill="#d1ecf1" stroke="#0dcaf0" stroke-width="1.5"/>
  <text x="200" y="357" text-anchor="middle" font-size="11" font-weight="bold" fill="#055160">ESM Embedding</text>
  <text x="200" y="372" text-anchor="middle" font-size="10" fill="#055160">320-D</text>

  <!-- Physicochemical box -->
  <rect x="480" y="340" width="160" height="40" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="1.5"/>
  <text x="560" y="357" text-anchor="middle" font-size="11" font-weight="bold" fill="#664d03">Physicochemical</text>
  <text x="560" y="372" text-anchor="middle" font-size="10" fill="#664d03">31-D  (AA comp, GRAVY, pI …)</text>

  <!-- Merge arrow -->
  <line x1="200" y1="380" x2="320" y2="418" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="560" y1="380" x2="440" y2="418" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Concat label -->
  <text x="380" y="408" text-anchor="middle" font-size="11" fill="#6c757d" font-style="italic">Concatenate</text>

  <!-- ── Combined features ── -->
  <rect x="255" y="420" width="250" height="36" rx="8" fill="#d0f0c0" stroke="#5cb85c" stroke-width="1.5"/>
  <text x="380" y="438" text-anchor="middle" font-size="12" font-weight="bold" fill="#1a5c1a">Combined Features  351-D</text>
  <text x="380" y="452" text-anchor="middle" font-size="10" fill="#1a5c1a">320 (ESM) + 31 (physicochemical)</text>

  <line x1="380" y1="456" x2="380" y2="477" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ THREE PARALLEL BASE LEARNERS ══ -->
  <!-- DL path (left) -->
  <line x1="340" y1="477" x2="160" y2="498" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- XGB path (center) -->
  <line x1="380" y1="477" x2="380" y2="498" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- LGB path (right) -->
  <line x1="420" y1="477" x2="600" y2="498" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- BASE 1: DL MLP -->
  <rect x="60" y="498" width="200" height="80" rx="8" fill="#cfe2ff" stroke="#6ea8fe" stroke-width="2"/>
  <text x="160" y="516" text-anchor="middle" font-size="11" font-weight="bold" fill="#084298">Base 1: ESM-DL</text>
  <text x="160" y="531" text-anchor="middle" font-size="10" fill="#084298">LayerNorm(351)</text>
  <text x="160" y="545" text-anchor="middle" font-size="10" fill="#084298">Linear(351→256) GELU Drop</text>
  <text x="160" y="559" text-anchor="middle" font-size="10" fill="#084298">Linear(256→128) GELU Drop</text>
  <text x="160" y="573" text-anchor="middle" font-size="10" fill="#084298">→ task head</text>

  <!-- BASE 2: XGBoost -->
  <rect x="280" y="498" width="200" height="80" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="380" y="516" text-anchor="middle" font-size="11" font-weight="bold" fill="#155724">Base 2: XGBoost</text>
  <text x="380" y="531" text-anchor="middle" font-size="10" fill="#155724">n_estimators=500</text>
  <text x="380" y="545" text-anchor="middle" font-size="10" fill="#155724">max_depth=4, lr=0.03</text>
  <text x="380" y="559" text-anchor="middle" font-size="10" fill="#155724">reg_α=0.5, reg_λ=2.0</text>
  <text x="380" y="573" text-anchor="middle" font-size="10" fill="#155724">on 351-D StandardScaled</text>

  <!-- BASE 3: LightGBM -->
  <rect x="500" y="498" width="200" height="80" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="600" y="516" text-anchor="middle" font-size="11" font-weight="bold" fill="#664d03">Base 3: LightGBM</text>
  <text x="600" y="531" text-anchor="middle" font-size="10" fill="#664d03">n_estimators=500</text>
  <text x="600" y="545" text-anchor="middle" font-size="10" fill="#664d03">num_leaves=31, lr=0.03</text>
  <text x="600" y="559" text-anchor="middle" font-size="10" fill="#664d03">reg_α=0.5, reg_λ=2.0</text>
  <text x="600" y="573" text-anchor="middle" font-size="10" fill="#664d03">on 351-D StandardScaled</text>

  <!-- Arrows to meta -->
  <line x1="160" y1="578" x2="310" y2="628" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="380" y1="578" x2="380" y2="628" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="600" y1="578" x2="450" y2="628" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- OOF label -->
  <text x="380" y="620" text-anchor="middle" font-size="10" fill="#6c757d" font-style="italic">K-Fold OOF predictions</text>

  <!-- ── META LEARNER ── -->
  <rect x="225" y="630" width="310" height="44" rx="8" fill="#f8d7da" stroke="#dc3545" stroke-width="2"/>
  <text x="380" y="650" text-anchor="middle" font-size="12" font-weight="bold" fill="#842029">Ridge Meta-Learner</text>
  <text x="380" y="666" text-anchor="middle" font-size="10" fill="#842029">Learns optimal weights over base predictions</text>

  <line x1="380" y1="674" x2="380" y2="695" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ══ FOUR OUTPUT HEADS ══ -->
  <text x="380" y="710" text-anchor="middle" font-size="11" fill="#6c757d">4 separate models — one per target</text>

  <!-- Branch lines -->
  <line x1="290" y1="714" x2="108" y2="740" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="340" y1="714" x2="286" y2="740" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="420" y1="714" x2="474" y2="740" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="470" y1="714" x2="652" y2="740" stroke="#6c757d" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- pH -->
  <rect x="30" y="740" width="156" height="52" rx="8" fill="#fde2e4" stroke="#e63946" stroke-width="2"/>
  <text x="108" y="761" text-anchor="middle" font-size="12" font-weight="bold" fill="#c1121f">pH</text>
  <text x="108" y="777" text-anchor="middle" font-size="10" fill="#c1121f">Regression</text>
  <text x="108" y="789" text-anchor="middle" font-size="10" fill="#c1121f">sigmoid×14  [0–14]</text>

  <!-- Salt -->
  <rect x="208" y="740" width="156" height="52" rx="8" fill="#fce4c8" stroke="#e07b39" stroke-width="2"/>
  <text x="286" y="761" text-anchor="middle" font-size="12" font-weight="bold" fill="#b85c00">Salt Conc</text>
  <text x="286" y="777" text-anchor="middle" font-size="10" fill="#b85c00">Regression (log)</text>
  <text x="286" y="789" text-anchor="middle" font-size="10" fill="#b85c00">+ salt-type classifier</text>

  <!-- PEG -->
  <rect x="396" y="740" width="156" height="52" rx="8" fill="#d4edda" stroke="#28a745" stroke-width="2"/>
  <text x="474" y="761" text-anchor="middle" font-size="12" font-weight="bold" fill="#155724">PEG Type</text>
  <text x="474" y="777" text-anchor="middle" font-size="10" fill="#155724">Classification</text>
  <text x="474" y="789" text-anchor="middle" font-size="10" fill="#155724">soft-vote probabilities</text>

  <!-- Temp -->
  <rect x="574" y="740" width="156" height="52" rx="8" fill="#cfe2ff" stroke="#0d6efd" stroke-width="2"/>
  <text x="652" y="761" text-anchor="middle" font-size="12" font-weight="bold" fill="#084298">Temperature</text>
  <text x="652" y="777" text-anchor="middle" font-size="10" fill="#084298">Regression (K)</text>
  <text x="652" y="789" text-anchor="middle" font-size="10" fill="#084298">+CatBoost for temp</text>

  <!-- ── EMBEDDING CACHE CALLOUT ── -->
  <rect x="30" y="830" width="700" height="56" rx="8" fill="#e9ecef" stroke="#adb5bd" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="380" y="851" text-anchor="middle" font-size="12" font-weight="bold" fill="#495057">⚡ Embedding Cache  (embeddings_cache/{pdb_id}.npy)</text>
  <text x="380" y="868" text-anchor="middle" font-size="11" fill="#6c757d">ESM-2 runs once per sequence → saved to disk.  All 4 models reuse the same cache.</text>
  <text x="380" y="882" text-anchor="middle" font-size="10" fill="#6c757d">~100× faster per epoch after first pass.  16 GB RAM safe.</text>

  <!-- Legend -->
  <rect x="30" y="900" width="700" height="60" rx="8" fill="#f8f9fa" stroke="#dee2e6"/>
  <text x="380" y="916" text-anchor="middle" font-size="11" font-weight="bold" fill="#495057">Legend</text>
  <rect x="50"  y="925" width="14" height="14" rx="3" fill="#cfe2ff" stroke="#6ea8fe"/>  <text x="70"  y="936" font-size="10" fill="#084298">ESM / DL</text>
  <rect x="155" y="925" width="14" height="14" rx="3" fill="#d4edda" stroke="#28a745"/> <text x="175" y="936" font-size="10" fill="#155724">XGBoost / LightGBM</text>
  <rect x="310" y="925" width="14" height="14" rx="3" fill="#fff3cd" stroke="#ffc107"/> <text x="330" y="936" font-size="10" fill="#664d03">LightGBM</text>
  <rect x="420" y="925" width="14" height="14" rx="3" fill="#f8d7da" stroke="#dc3545"/> <text x="440" y="936" font-size="10" fill="#842029">Meta-Learner</text>
  <rect x="530" y="925" width="14" height="14" rx="3" fill="#e9ecef" stroke="#adb5bd" stroke-dasharray="4,2"/> <text x="550" y="936" font-size="10" fill="#6c757d">Optimization</text>

  <!-- arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6c757d"/>
    </marker>
  </defs>

</svg>
