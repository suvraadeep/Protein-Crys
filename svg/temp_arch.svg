<?xml version="1.0" encoding="UTF-8"?>
<svg width="760" height="370" viewBox="0 0 760 370" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#845EC2"/>
    </marker>
  </defs>
  <rect width="760" height="370" fill="#F5F0FA" rx="12"/>
  <text x="380" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#2C3E50">Temperature Prediction Architecture</text>
  <text x="380" y="52" text-anchor="middle" font-size="12" fill="#7F8C8D">Biology: IVYWREL + aliphatic index encode thermostability from sequence</text>

  <!-- Trunk -->
  <rect x="30" y="80" width="130" height="50" rx="8" fill="#D4EFDF" stroke="#27AE60" stroke-width="2"/>
  <text x="95" y="101" text-anchor="middle" font-size="11" font-weight="bold" fill="#1A8A4A">ESMBackbone</text>
  <text x="95" y="118" text-anchor="middle" font-size="10" fill="#555">368-D → 128-D trunk</text>

  <!-- Thermo injection -->
  <rect x="30" y="155" width="130" height="78" rx="8" fill="#FEF9E7" stroke="#F39C12" stroke-width="2"/>
  <text x="95" y="175" text-anchor="middle" font-size="10" font-weight="bold" fill="#D68910">Thermo Injection</text>
  <text x="95" y="193" text-anchor="middle" font-size="9" fill="#555">thermostability_idx[37]</text>
  <text x="95" y="210" text-anchor="middle" font-size="9" fill="#555">IVYWREL / len</text>
  <text x="95" y="228" text-anchor="middle" font-size="9" fill="#555">aliphatic_idx[26]</text>

  <line x1="160" y1="105" x2="225" y2="148" stroke="#845EC2" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="160" y1="194" x2="225" y2="168" stroke="#F39C12" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- cat -->
  <rect x="225" y="140" width="100" height="46" rx="8" fill="#EDE7F6" stroke="#845EC2" stroke-width="2"/>
  <text x="275" y="160" text-anchor="middle" font-size="11" font-weight="bold" fill="#6A3FA0">cat</text>
  <text x="275" y="177" text-anchor="middle" font-size="10" fill="#555">130-D</text>

  <!-- Temp Head -->
  <line x1="325" y1="163" x2="365" y2="163" stroke="#845EC2" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="365" y="120" width="145" height="86" rx="8" fill="#EDE7F6" stroke="#845EC2" stroke-width="2.5"/>
  <text x="437" y="142" text-anchor="middle" font-size="12" font-weight="bold" fill="#4A235A">Temp Head</text>
  <text x="437" y="159" text-anchor="middle" font-size="10" fill="#555">Linear(130 → 64)</text>
  <text x="437" y="175" text-anchor="middle" font-size="10" fill="#555">GELU → Linear(64 → 1)</text>
  <text x="437" y="191" text-anchor="middle" font-size="10" fill="#555">Output: temp in Kelvin</text>
  <text x="437" y="204" text-anchor="middle" font-size="9" fill="#888">HuberLoss (δ=1) training</text>

  <!-- 4 base learners -->
  <rect x="535" y="100" width="115" height="108" rx="8" fill="#EDE7F6" stroke="#845EC2" stroke-width="1.5"/>
  <text x="592" y="120" text-anchor="middle" font-size="10" font-weight="bold" fill="#6A3FA0">4 Base Learners</text>
  <text x="592" y="138" text-anchor="middle" font-size="10" fill="#555">① DL (TempModel)</text>
  <text x="592" y="155" text-anchor="middle" font-size="10" fill="#555">② XGBoost</text>
  <text x="592" y="172" text-anchor="middle" font-size="10" fill="#555">③ LightGBM</text>
  <text x="592" y="189" text-anchor="middle" font-size="10" fill="#555">④ CatBoost (optional)</text>
  <text x="592" y="204" text-anchor="middle" font-size="10" fill="#6A3FA0">→ Ridge meta-learner</text>
  <line x1="510" y1="163" x2="533" y2="163" stroke="#845EC2" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="663" y="136" width="88" height="56" rx="8" fill="#845EC2"/>
  <text x="707" y="155" text-anchor="middle" font-size="10" font-weight="bold" fill="white">Temp (K/°C)</text>
  <text x="707" y="172" text-anchor="middle" font-size="9" fill="#D7BDE2">e.g. 277K / 4°C</text>
  <text x="707" y="186" text-anchor="middle" font-size="9" fill="#D7BDE2">cold room</text>
  <line x1="650" y1="163" x2="661" y2="163" stroke="#845EC2" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Thermostability note -->
  <rect x="30" y="290" width="320" height="66" rx="8" fill="white" stroke="#BDC3C7" stroke-width="1"/>
  <text x="50" y="310" font-size="10" font-weight="bold" fill="#444">IVYWREL thermostability index:</text>
  <text x="50" y="327" font-size="10" fill="#666">fraction of I,V,Y,W,R,E,L — enriched in thermophiles</text>
  <text x="50" y="344" font-size="10" fill="#666">High IVYWREL + high AI → stable at room temperature</text>

  <!-- Aliphatic note -->
  <rect x="365" y="290" width="270" height="66" rx="8" fill="white" stroke="#BDC3C7" stroke-width="1"/>
  <text x="385" y="310" font-size="10" font-weight="bold" fill="#444">Aliphatic index (Ikai 1980):</text>
  <text x="385" y="327" font-size="10" fill="#666">[Ala + 2.9×Val + 3.9×(Ile+Leu)] / len × 100</text>
  <text x="385" y="344" font-size="10" fill="#666">AI &gt; 80: mesophilic · AI &gt; 100: thermostable</text>
</svg>
